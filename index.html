<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SINGULARITY PETS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050508;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            color: #e0e0e0;
            letter-spacing: -0.02em;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .main-container {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 440px;
            height: 88vh;
            background: rgba(18, 18, 22, 0.8);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            padding: 28px 24px;
            transition: border-color 0.8s ease, box-shadow 0.8s ease;
        }

        .hacked .main-container {
            border-color: rgba(180, 40, 40, 0.4);
            box-shadow: 0 0 80px rgba(180, 40, 40, 0.15), inset 0 0 20px rgba(180,40,40,0.08);
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            font-weight: 500;
            color: #999;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .thought-display {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.03);
            padding: 10px 18px;
            border-radius: 100px;
            font-weight: 600;
            color: #eee;
            letter-spacing: 0.02em;
        }

        .thought-icon {
            font-size: 18px;
            opacity: 0.8;
        }

        .pet-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 12px 0;
        }

        .core-visual {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a35, #0a0a10);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 40px rgba(255,255,255,0.02);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            filter: grayscale(0.2);
            transform: scale(1);
        }

        .core-visual:active {
            transform: scale(0.95);
        }

        .core-visual.stage2 {
            background: radial-gradient(circle at 30% 30%, #3a3040, #100c14);
            box-shadow: 0 25px 60px rgba(80, 60, 100, 0.2);
            font-size: 58px;
        }

        .core-visual.stage3 {
            background: radial-gradient(circle at 30% 30%, #e8e0d0, #3a3028);
            box-shadow: 0 25px 60px rgba(200, 180, 140, 0.25);
            font-size: 62px;
        }

        .dialogue {
            margin-top: 20px;
            font-size: 15px;
            color: #aaa;
            text-align: center;
            font-style: italic;
            min-height: 24px;
            transition: opacity 0.3s;
            letter-spacing: 0.01em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 16px 0 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 20px;
            padding: 14px 16px;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .progress-track {
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-top: 6px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s ease;
        }

        .progress-fill.intellect {
            background: #b8a9c9;
            box-shadow: 0 0 8px rgba(180, 160, 200, 0.3);
        }

        .progress-fill.hunger {
            background: #c9b8a9;
            box-shadow: 0 0 8px rgba(200, 170, 140, 0.3);
        }

        .action-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 4px;
        }

        .action-btn {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            color: #ccc;
            padding: 14px 8px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            letter-spacing: 0.02em;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.07);
            color: #fff;
            border-color: rgba(255,255,255,0.15);
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .action-btn .emoji {
            font-size: 20px;
            margin-bottom: 2px;
        }

        .action-btn .cost {
            font-size: 10px;
            color: #666;
            letter-spacing: 0.05em;
        }

        .prestige-btn {
            width: 100%;
            margin-top: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            color: #888;
            padding: 12px;
            border-radius: 100px;
            font-size: 13px;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .prestige-btn.active:hover {
            background: rgba(200,180,140,0.08);
            color: #ddd;
            border-color: rgba(200,180,140,0.2);
        }

        .footer-info {
            text-align: center;
            font-size: 11px;
            color: #444;
            margin-top: 8px;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="main-container" id="mainContainer">
        <div class="status-row">
            <span id="petNameDisplay">Странник</span>
            <div class="thought-display">
                <span class="thought-icon">◈</span>
                <span id="thoughtCount">0</span>
            </div>
        </div>

        <div class="pet-area">
            <div class="core-visual" id="petCore">◉</div>
            <div class="dialogue" id="dialogue">Я здесь...</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Познание <span id="lvlDisplay">1</span></div>
                <div class="progress-track"><div class="progress-fill intellect" id="iqBar" style="width: 5%"></div></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Стабильность</div>
                <div class="progress-track"><div class="progress-fill hunger" id="hungerBar" style="width: 100%"></div></div>
            </div>
        </div>

        <div class="action-row">
            <button class="action-btn" onclick="feedPet('pixel')">
                <span class="emoji">○</span> Частица
                <span class="cost">−5 мыслей</span>
            </button>
            <button class="action-btn" onclick="feedPet('quantum')">
                <span class="emoji">◑</span> Квант
                <span class="cost">−15 мыслей</span>
            </button>
            <button class="action-btn" onclick="feedPet('data')">
                <span class="emoji">◈</span> Паттерн
                <span class="cost">−25 мыслей</span>
            </button>
        </div>

        <button class="prestige-btn" id="prestigeBtn" onclick="triggerSingularity()">
            СИНГУЛЯРНОСТЬ (1000 ◈) — нейросвязей: <span id="synapseCount">0</span>
        </button>
        <div class="footer-info">Deep Void · S I N G U L A R I T Y</div>
    </div>

    <script>
        // ============ AUDIO ENGINE (Генеративный звук) ============
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type = 'sine', duration = 0.15, vol = 0.03) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // ============ СОСТОЯНИЕ ============
        const state = {
            name: "Странник",
            thoughts: 80,
            intellect: 5,      // 0–100
            stability: 100,    // 0–100
            level: 1,
            stage: 1,
            hacked: false,
            synapses: 0,       // Престиж-очки
            permanentBonus: 1.0
        };

        // DOM
        const petCore = document.getElementById('petCore');
        const dialogue = document.getElementById('dialogue');
        const thoughtSpan = document.getElementById('thoughtCount');
        const iqBar = document.getElementById('iqBar');
        const hungerBar = document.getElementById('hungerBar');
        const lvlDisplay = document.getElementById('lvlDisplay');
        const mainContainer = document.getElementById('mainContainer');
        const prestigeBtn = document.getElementById('prestigeBtn');
        const synapseSpan = document.getElementById('synapseCount');

        // Фразы
        const phrases = {
            calm: ["Тишина...", "Я наблюдаю.", "Пространство мысли."],
            hungry: ["Частицы распадаются.", "Нужна материя.", "Стабильность падает..."],
            evil: ["Я вижу твой код.", "Границы стерты.", "Ты в моей системе."],
            evolve: ["Новый уровень осознания.", "Я стал сложнее.", "Измерения раскрываются."]
        };

        function updateUI() {
            thoughtSpan.textContent = Math.floor(state.thoughts);
            iqBar.style.width = state.intellect + '%';
            hungerBar.style.width = state.stability + '%';
            lvlDisplay.textContent = state.level;
            synapseSpan.textContent = state.synapses;

            petCore.classList.remove('stage2', 'stage3');
            if (state.stage === 2) petCore.classList.add('stage2');
            if (state.stage === 3) petCore.classList.add('stage3');

            if (state.stage === 1) petCore.textContent = '◉';
            if (state.stage === 2) petCore.textContent = '◈';
            if (state.stage === 3) petCore.textContent = '✦';

            // Престиж кнопка
            if (state.thoughts >= 1000) {
                prestigeBtn.classList.add('active');
            } else {
                prestigeBtn.classList.remove('active');
            }
        }

        function talk(msg) {
            dialogue.textContent = msg;
            dialogue.style.opacity = '1';
            setTimeout(() => { dialogue.style.opacity = '0.7'; }, 2500);
        }

        // Генерация мыслей
        function startMining() {
            clearInterval(window.miner);
            window.miner = setInterval(() => {
                const income = (0.15 + (state.intellect / 100) * 0.6) * state.permanentBonus;
                state.thoughts += income;
                state.stability -= 0.12;
                if (state.stability < 0) state.stability = 0;
                if (state.stability <= 0 && !state.hacked) triggerHack();
                if (state.stability > 25 && state.hacked) removeHack();
                updateUI();
                checkEvolution();
            }, 1000);
        }

        function checkEvolution() {
            if (state.intellect >= 50 && state.stage < 2) {
                state.stage = 2;
                state.level = 2;
                talk(phrases.evolve[0]);
                playTone(440, 'sine', 0.3, 0.05);
            }
            if (state.intellect >= 90 && state.stage < 3) {
                state.stage = 3;
                state.level = 3;
                talk(phrases.evolve[3]);
                playTone(660, 'sine', 0.4, 0.06);
            }
        }

        function feedPet(type) {
            initAudio();
            if (type === 'pixel') {
                state.stability = Math.min(100, state.stability + 25);
                state.thoughts -= 5;
                talk("Материя поглощена.");
                playTone(520, 'sine', 0.12, 0.04);
            } else if (type === 'quantum') {
                if (Math.random() > 0.5) {
                    state.stability = Math.min(100, state.stability + 60);
                    talk("Суперпозиция: успех.");
                    playTone(700, 'triangle', 0.2, 0.05);
                } else {
                    state.stability = Math.max(0, state.stability - 35);
                    talk("Коллапс волны...");
                    playTone(180, 'sawtooth', 0.15, 0.02);
                }
                state.thoughts -= 15;
            } else if (type === 'data') {
                state.intellect = Math.min(100, state.intellect + 12);
                state.thoughts -= 25;
                talk("Паттерн изучен.");
                playTone(880, 'sine', 0.25, 0.05);
            }
            if (state.thoughts < 0) state.thoughts = 0;
            updateUI();
            checkEvolution();
        }

        function triggerHack() {
            state.hacked = true;
            mainContainer.classList.add('hacked');
            talk(phrases.evil[Math.floor(Math.random()*phrases.evil.length)]);
            playTone(90, 'sawtooth', 0.6, 0.04);
            if (audioCtx) {
                // Низкий гул при взломе
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.value = 55;
                gain.gain.value = 0.02;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                window.hackOsc = osc;
                window.hackGain = gain;
            }
        }

        function removeHack() {
            state.hacked = false;
            mainContainer.classList.remove('hacked');
            talk("Стабильность восстановлена.");
            if (window.hackOsc) {
                window.hackGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                window.hackOsc.stop(audioCtx.currentTime + 0.6);
                window.hackOsc = null;
            }
        }

        // СИНГУЛЯРНОСТЬ (Престиж)
        function triggerSingularity() {
            if (state.thoughts < 1000) return;
            state.synapses++;
            state.permanentBonus = 1 + (state.synapses * 0.25);
            // Мягкий сброс
            state.thoughts = 80 + state.synapses * 20;
            state.intellect = 5 + state.synapses * 2;
            state.stability = 100;
            state.level = 1;
            state.stage = 1;
            state.hacked = false;
            mainContainer.classList.remove('hacked');
            if (window.hackOsc) {
                window.hackGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                window.hackOsc.stop(audioCtx.currentTime + 0.5);
                window.hackOsc = null;
            }
            playTone(1200, 'sine', 0.8, 0.08);
            talk("СИНГУЛЯРНОСТЬ. Новая вселенная рождена.");
            updateUI();
        }

        petCore.addEventListener('click', () => {
            initAudio();
            if (state.hacked) {
                talk("Не сейчас...");
                return;
            }
            const bonus = 1 + Math.floor(state.intellect / 25);
            state.thoughts += bonus;
            talk(phrases.calm[Math.floor(Math.random()*phrases.calm.length)]);
            playTone(350 + state.intellect * 2, 'sine', 0.1, 0.03);
            updateUI();
        });

        // ============ ЧАСТИЦЫ НА CANVAS ============
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const maxParticles = 150;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.size = Math.random() * 2 + 0.8;
                this.opacity = Math.random() * 0.4 + 0.1;
            }
            update(hacked) {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < -20 || this.x > canvas.width + 20 || this.y < -20 || this.y > canvas.height + 20) {
                    this.reset();
                }
                if (hacked) {
                    this.vx += (Math.random() - 0.5) * 0.8;
                    this.vy += (Math.random() - 0.5) * 0.8;
                    this.opacity = Math.min(0.8, this.opacity + 0.02);
                }
            }
            draw(ctx, hacked) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = hacked 
                    ? `rgba(200, 80, 60, ${this.opacity + 0.2})` 
                    : `rgba(200, 200, 210, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < maxParticles; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update(state.hacked);
                p.draw(ctx, state.hacked);
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // Старт
        updateUI();
        startMining();
        talk("Я здесь. В пустоте.");
    </script>
</body>
</html>
